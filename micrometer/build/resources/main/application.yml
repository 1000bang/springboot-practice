

# 앤드포인트 노출
management:
  endpoints:
    web:
      exposure:
        include: "*"
  # 앤드포인트 활성화
  endpoint:
    shutdown:
      enabled: true
    health:
      #show-components: always
      show-details: always #detail이 너무 디테일하면 show-components
  info:
    java:
      enabled: true
    os:
      enabled: true
    env:
      enabled: true


info:
  app:
    name: hello-actuator
    company: bang
    version: 0.0.1

# loggin 레벨 지정
logging:
  level:
    hello.controller: debug
